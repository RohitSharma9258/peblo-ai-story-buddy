name: peblo_ai_story_buddy
description: "Peblo - AI Story Buddy & Quiz Component Flutter application for children's storytelling and reading comprehension."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1

  # Text-to-Speech
  flutter_tts: ^4.0.2

  # Animations
  flutter_animate: ^4.5.0
  confetti: ^0.7.0

  # UI and Fonts
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/data/
    - assets/images/
